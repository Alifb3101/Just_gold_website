<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Just Gold Cosmetics - Premium Makeup & Cosmetics</title>
    <meta name="title" content="Just Gold Cosmetics - Premium Makeup & Cosmetics" />
    <meta name="description" content="Discover premium makeup and cosmetics from Just Gold Cosmetics. Shop high-end beauty essentials with free shipping." />
    <meta name="keywords" content="just gold cosmetics, premium makeup, cosmetics, beauty products, high-end makeup" />
    <meta name="author" content="Just Gold Cosmetics" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" sizes="180x180" />
    <link rel="icon" type="image/png" href="/favicon.png" sizes="96x96" />
    <link rel="icon" type="image/png" href="/favicon.png" sizes="48x48" />
    <link rel="shortcut icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" sizes="180x180" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.justgoldcosmetics.com/" />
    <meta property="og:title" content="Just Gold Cosmetics - Premium Makeup & Cosmetics" />
    <meta property="og:description" content="Discover premium makeup and cosmetics from Just Gold Cosmetics. Shop high-end beauty essentials." />
    <meta property="og:image" content="https://www.justgoldcosmetics.com/og-image.jpg" />
    <meta property="og:site_name" content="Just Gold Cosmetics" />
    <meta property="og:locale" content="en_US" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://www.justgoldcosmetics.com/" />
    <meta name="twitter:title" content="Just Gold Cosmetics - Premium Makeup & Cosmetics" />
    <meta name="twitter:description" content="Discover premium makeup and cosmetics from Just Gold Cosmetics. Shop high-end beauty essentials." />
    <meta name="twitter:image" content="https://www.justgoldcosmetics.com/og-image.jpg" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#D4AF37" />
    <meta name="msapplication-TileColor" content="#D4AF37" />
    
    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://res.cloudinary.com" />
    
    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    
    <!-- DNS Prefetch for performance -->
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Just Gold Cosmetics",
        "url": "https://www.justgoldcosmetics.com",
        "logo": "https://www.justgoldcosmetics.com/logo.png",
        "description": "Just Gold Cosmetics is a premium makeup and cosmetics brand offering high-quality beauty essentials for lips, eyes, face, nails, and professional looks.",
        "sameAs": [
          "https://www.instagram.com/justgoldcosmetics",
          "https://www.tiktok.com/@just.gold.make.up"
        ]
      }
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Just Gold Cosmetics",
        "url": "https://www.justgoldcosmetics.com",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://www.justgoldcosmetics.com/shop?search={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
